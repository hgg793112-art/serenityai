
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>小宁陪你 - 宁静岛 · 你的情绪小伙伴</title>

    <!-- PWA Meta Tags：与启动页顶底同色 -->
    <meta name="theme-color" content="#E8DCC4" />
    <meta name="description" content="小宁陪你：来自宁静岛的刺猬小伙伴，小宁懂你，陪你慢慢好起来。" />

    <!-- iOS PWA Support：透明状态列，渐层全萤幕无黑边 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="小宁陪你" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- App Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;400&display=swap" rel="stylesheet">
    <style>
      html, body {
        background: #E8DCC4;
        min-height: 100vh;
        min-height: 100dvh;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(232, 224, 245, 0.4);
      }
      .glass-warm {
        background: rgba(255, 252, 248, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(232, 224, 245, 0.35);
      }
      @keyframes float-soft {
        0%, 100% { transform: translateY(0); opacity: 1; }
        50% { transform: translateY(-4px); opacity: 0.92; }
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      ::-webkit-scrollbar { width: 0px; }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="flex justify-center items-center min-h-screen">
    <div id="root" class="w-full min-h-full max-w-lg" style="min-height: 100vh; min-height: 100dvh;"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
